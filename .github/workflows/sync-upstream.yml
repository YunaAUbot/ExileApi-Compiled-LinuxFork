name: Sync upstream

on:
  workflow_dispatch:
  schedule:
    # Daily at 03:17 UTC. Scheduled workflows run from the default branch.
    - cron: '17 3 * * *'

# The workflow uses its repository-scoped GITHUB_TOKEN only to update this fork.
permissions:
  contents: write

concurrency:
  group: upstream-sync-master
  cancel-in-progress: false

jobs:
  merge-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Check out fork master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Merge upstream when conflict-free
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git remote add upstream https://github.com/exApiTools/ExileApi-Compiled.git
          git fetch --no-tags upstream master
          git fetch --no-tags origin upstream-sync-base:refs/remotes/origin/upstream-sync-base

          upstream_head=$(git rev-parse upstream/master)
          upstream_base=$(git rev-parse origin/upstream-sync-base)

          if git merge-base --is-ancestor upstream/master HEAD; then
            echo 'Fork is already up to date.'
            exit 0
          fi

          if git merge-base HEAD upstream/master >/dev/null; then
            # The ordinary case: retain upstream's history in a merge commit.
            git merge --no-ff --no-edit upstream/master
          else
            # Upstream rewrote its branch and no common Git ancestor remains.
            # Recreate a proper three-way merge from the last synchronized
            # upstream snapshot, which is retained on the fork as the
            # upstream-sync-base branch even if upstream force-pushes again.
            echo 'Upstream has no common history; attempting a content merge.'
            echo '### Upstream history was rewritten' >> "$GITHUB_STEP_SUMMARY"
            echo 'Applying the upstream delta to the last synchronized snapshot.' >> "$GITHUB_STEP_SUMMARY"
            patch_file=$(mktemp)
            git diff --binary "$upstream_base" "$upstream_head" > "$patch_file"
            if ! git apply --3way --index "$patch_file"; then
              echo '::error::Upstream has overlapping changes; no files were pushed.'
              echo '### Upstream sync needs manual resolution' >> "$GITHUB_STEP_SUMMARY"
              echo 'The three-way content merge had overlapping file changes. The fork was not modified.' >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi
            if ! git diff --cached --quiet; then
              git commit -m "Sync rewritten upstream snapshot"
            fi
          fi

          # Advance the durable merge base only after the sync completed. This
          # remote branch is metadata, not a user-facing development branch.
          git push origin HEAD:master "$upstream_head:refs/heads/upstream-sync-base"
