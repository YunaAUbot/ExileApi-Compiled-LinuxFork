name: Sync upstream

on:
  workflow_dispatch:
  schedule:
    # Daily at 03:17 UTC. Scheduled workflows run from the default branch.
    - cron: '17 3 * * *'

# The workflow uses its repository-scoped GITHUB_TOKEN only to update this fork.
permissions:
  contents: write

concurrency:
  group: upstream-sync-master
  cancel-in-progress: false

jobs:
  merge-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Check out fork master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Merge upstream when conflict-free
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git remote add upstream https://github.com/exApiTools/ExileApi-Compiled.git
          git fetch --no-tags upstream master

          if git merge-base --is-ancestor upstream/master HEAD; then
            echo 'Fork is already up to date.'
            exit 0
          fi

          if git merge-base HEAD upstream/master >/dev/null; then
            merge_args=(--no-ff --no-edit)
          else
            # Upstream rewrote its branch and no common Git ancestor remains.
            # Git can still merge identical/non-overlapping file snapshots; it
            # must be told explicitly to permit this kind of merge.
            echo 'Upstream has no common history; attempting a content merge.'
            echo '### Upstream history was rewritten' >> "$GITHUB_STEP_SUMMARY"
            echo 'Trying a conflict-free content merge with the current fork.' >> "$GITHUB_STEP_SUMMARY"
            merge_args=(--allow-unrelated-histories --no-ff --no-edit)
          fi

          # Never pick a side automatically on a real content conflict. Abort
          # before push so the fork remains unchanged and the run log provides
          # a precise signal for manual resolution.
          if ! git merge "${merge_args[@]}" upstream/master; then
            git merge --abort || true
            echo '::error::Upstream has overlapping changes; no files were pushed.'
            echo '### Upstream sync needs manual resolution' >> "$GITHUB_STEP_SUMMARY"
            echo 'The attempted merge had overlapping file changes. The fork was not modified.' >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          git push origin HEAD:master
